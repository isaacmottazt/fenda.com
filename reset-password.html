<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Redefinir Senha — Fenda Music</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="fonts/material-symbols.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0c0916 0%, #05030a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container principal com glassmorphism refinado */
        .reset-wrapper {
            max-width: 460px;
            width: 100%;
            animation: fadeSlideUp 0.5s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-card {
            background: rgba(20, 18, 30, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(146, 76, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(146, 76, 255, 0.1) inset;
            padding: 32px 28px;
            transition: transform 0.2s;
        }

        .reset-card:hover {
            transform: scale(1.01);
            border-color: rgba(146, 76, 255, 0.5);
        }

        /* Cabeçalho com ícone decorativo */
        .reset-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .reset-icon {
            background: linear-gradient(135deg, #924cff, #6a2ad4);
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(146, 76, 255, 0.3);
        }

        .reset-icon span {
            font-size: 40px;
            color: white;
        }

        .reset-header h2 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .reset-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Campos do formulário */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(146, 76, 255, 0.3);
            border-radius: 28px;
            padding: 4px 16px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #b07fff;
            background: rgba(146, 76, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(146, 76, 255, 0.2);
        }

        .input-wrapper span {
            color: #b07fff;
            font-size: 22px;
            margin-right: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            padding: 14px 0;
            font-size: 15px;
            color: white;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }

        /* Botão principal */
        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, #924cff, #6a2ad4);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .reset-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(146, 76, 255, 0.5);
        }

        /* Link de voltar */
        .back-link {
            text-align: center;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #c084fc;
        }

        /* Mensagem de status (toast interno) */
        .message-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 12px 18px;
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .message-box.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #a5d6a7;
        }

        .message-box.error {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
            color: #ffab91;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .reset-card {
                padding: 24px 20px;
            }
            .reset-header h2 {
                font-size: 22px;
            }
            .reset-icon {
                width: 60px;
                height: 60px;
            }
            .reset-icon span {
                font-size: 32px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="reset-wrapper">
        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-icon">
                    <span class="material-symbols-rounded">lock_reset</span>
                </div>
                <h2>Criar nova senha</h2>
                <p>Digite sua nova senha abaixo</p>
            </div>

            <div class="input-group">
                <label>Nova senha</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">check_circle</span>
                    <input type="password" id="confirmPassword" placeholder="Digite novamente a senha" autocomplete="new-password">
                </div>
            </div>

            <button id="updatePasswordBtn" class="reset-btn">
                <span class="material-symbols-rounded">save</span> Atualizar senha
            </button>

            <div class="back-link">
                <a href="index.html">
                    <span class="material-symbols-rounded">arrow_back</span> Voltar para o login
                </a>
            </div>

            <div id="message" class="message-box" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Extrair tokens da URL (hash)
        const params = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = params.get('access_token');

        const messageDiv = document.getElementById('message');
        const updateBtn = document.getElementById('updatePasswordBtn');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');

        function showMessage(text, type) {
            messageDiv.style.display = 'block';
            messageDiv.textContent = text;
            messageDiv.className = `message-box ${type}`;
            // Esconde após 5 segundos se for sucesso
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        if (!accessToken) {
            showMessage('Link inválido ou expirado. Solicite uma nova redefinição de senha.', 'error');
            updateBtn.disabled = true;
            updateBtn.style.opacity = '0.6';
            updateBtn.style.cursor = 'not-allowed';
        }

        updateBtn.addEventListener('click', async () => {
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmInput.value.trim();

            if (newPassword.length < 6) {
                showMessage('A senha deve ter no mínimo 6 caracteres.', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('As senhas não coincidem.', 'error');
                return;
            }

            // Atualizar senha no Supabase
            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('Senha atualizada com sucesso! Redirecionando para o login...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2500);
            }
        });

        // Registra o service worker para habilitar funcionamento offline (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[SW] Registrado com sucesso:', reg.scope))
                    .catch(err => console.warn('[SW] Falha ao registrar:', err));
            });
        }
    </script>
</body>
</html>
